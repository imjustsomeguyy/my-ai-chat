<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Chat</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    #output { white-space: pre-wrap; background: #f4f4f4; padding: 16px; border-radius: 8px; min-height: 100px; margin-top: 12px; }
    textarea { width: 100%; height: 80px; margin-top: 12px; padding: 8px; font-size: 1rem; }
    button { margin-top: 8px; padding: 10px 20px; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>AI Chat</h1>
  <textarea id="prompt" placeholder="Ask me anything..."></textarea>
  <br>
  <button onclick="ask()">Send</button>
  <div id="output">Response will appear here...</div>

  <script>
    async function ask() {
      const prompt = document.getElementById('prompt').value;
      if (!prompt) return;
      const output = document.getElementById('output');
      output.textContent = 'Thinking...';

      // Stream the response token by token
      const resp = await puter.ai.chat(prompt, {
        model: 'claude-sonnet-4-5',  // or 'gpt-4o', 'gemini-2.5-flash-lite', etc.
        stream: true
      });

      output.textContent = '';
      for await (const part of resp) {
        output.textContent += part?.text ?? '';
      }
    }
  </script>
</body>
</html>
