<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link id="hlThemeLink" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    /* ══ CSS VARIABLES ══ */
    :root {
      --bg:#1a1f1c; --card:#222827; --text:#dfeee0; --text-sub:#6b7c6e;
      --accent:#68b06a; --accent-hover:#4f9a52;
      --btn-bg:#2a2f2d; --btn-border:#555;
      --input-bg:#2a2f2d; --input-border:#555;
      --msg-user:#2a3d2c; --msg-ai:#222827;
      --scrollbar:#333; --code-bg:#1a1e1b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background 0.35s, color 0.35s;
      overflow: hidden;
    }

    /* ══ TOPBAR ══ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      background: var(--card);
      border-bottom: 1px solid var(--btn-border);
      gap: 0.6rem;
      flex-shrink: 0;
      transition: background 0.35s, border-color 0.35s;
    }
    .topbar-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.5rem; }

    /* model select */
    #modelSelect {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 0.5rem;
      padding: 0.38rem 0.55rem;
      font-size: 0.75rem;
      cursor: pointer;
      max-width: 200px;
      transition: background 0.3s, border-color 0.3s;
    }
    #modelSelect:focus { outline: none; border-color: var(--accent); }

    .icon-btn {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 0.5rem;
      padding: 0.38rem 0.55rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--btn-border); border-color: var(--accent); }

    /* ══ ACCOUNT BUTTON ══ */
    .account-btn {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 0.5rem;
      padding: 0.25rem 0.55rem 0.25rem 0.35rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.4rem;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .account-btn:hover { background: var(--btn-border); border-color: var(--accent); }
    .account-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.65rem; color: #fff;
      flex-shrink: 0;
    }
    .account-name {
      max-width: 90px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text);
    }

    /* ══ ACCOUNT DROPDOWN ══ */
    .account-dropdown-wrap {
      position: relative;
    }
    .account-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--card);
      border: 1px solid var(--btn-border);
      border-radius: 0.75rem;
      min-width: 220px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      z-index: 200;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px) scale(0.97);
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(.22,1,.36,1);
    }
    .account-dropdown.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }
    .acct-header {
      padding: 0.75rem 0.9rem 0.6rem;
      border-bottom: 1px solid var(--btn-border);
    }
    .acct-header-name {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 0.1rem;
    }
    .acct-header-email {
      font-size: 0.68rem;
      color: var(--text-sub);
    }
    .acct-divider { height: 1px; background: var(--btn-border); }
    .acct-action {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.6rem 0.9rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      transition: background 0.15s;
    }
    .acct-action:hover { background: var(--btn-bg); }
    .acct-action svg { flex-shrink: 0; opacity: 0.7; }
    .acct-action.danger { color: #e05555; }
    .acct-action.danger svg { opacity: 1; }
    .acct-action.danger:hover { background: rgba(224,85,85,0.1); }

    /* ══ MESSAGES ══ */
    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }
    #chatWindow::-webkit-scrollbar { width: 6px; }
    #chatWindow::-webkit-scrollbar-track { background: transparent; }
    #chatWindow::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .msg {
      max-width: 82%;
      padding: 0.7rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.88rem;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      transition: background 0.3s;
    }
    .msg.user {
      background: var(--msg-user);
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
      color: var(--text);
    }
    .msg.ai {
      background: var(--msg-ai);
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
      border: 1px solid var(--btn-border);
      white-space: normal;
    }
    .msg.ai p { margin-bottom: 0.5em; }
    .msg.ai p:last-child { margin-bottom: 0; }

    /* Code blocks */
    .msg.ai pre {
      background: var(--code-bg);
      border: 1px solid var(--btn-border);
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 0.5em 0;
      position: relative;
    }
    .msg.ai pre code {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      padding: 0.85rem 1rem;
      display: block;
      background: transparent !important;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 0.7rem;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--btn-border);
      border-radius: 0.5rem 0.5rem 0 0;
    }
    .code-lang { font-size: 0.67rem; color: var(--text-sub); font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; }
    .copy-code-btn {
      background: none; border: 1px solid var(--btn-border);
      color: var(--text-sub); border-radius: 0.3rem;
      padding: 0.15rem 0.5rem; font-size: 0.65rem;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .copy-code-btn:hover { color: var(--accent); border-color: var(--accent); }

    .msg.ai code:not(pre code) {
      background: var(--code-bg);
      border: 1px solid var(--btn-border);
      padding: 0.1em 0.35em;
      border-radius: 0.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.82em;
    }

    .msg.ai h1,.msg.ai h2,.msg.ai h3 { margin: 0.6em 0 0.25em; color: var(--accent); font-size: 0.95em; }
    .msg.ai ul,.msg.ai ol { padding-left: 1.3em; margin: 0.3em 0; }
    .msg.ai li { margin-bottom: 0.2em; }
    .msg.ai strong { color: var(--text); }
    .msg.ai a { color: var(--accent); }
    .msg.ai hr { border: none; border-top: 1px solid var(--btn-border); margin: 0.6em 0; }
    .msg.ai table { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.82em; }
    .msg.ai th,.msg.ai td { border: 1px solid var(--btn-border); padding: 0.3em 0.6em; }
    .msg.ai th { background: var(--btn-bg); color: var(--accent); }

    .msg-label { font-size: 0.62rem; color: var(--text-sub); margin-bottom: 0.15rem; padding: 0 0.2rem; }
    .msg-label.right { text-align: right; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 0.7rem 0.9rem; }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); opacity: 0.4;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px); opacity:1} }

    /* ══ INPUT BAR ══ */
    .input-bar {
      padding: 0.75rem 1rem;
      background: var(--card);
      border-top: 1px solid var(--btn-border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
      transition: background 0.35s;
    }
    #userInput {
      flex: 1;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 0.7rem;
      padding: 0.6rem 0.8rem;
      font-size: 0.88rem;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      overflow-y: auto;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.3s;
    }
    #userInput:focus { outline: none; border-color: var(--accent); }
    #userInput::placeholder { color: var(--text-sub); }

    #sendBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.7rem;
      padding: 0.6rem 1rem;
      font-size: 0.88rem;
      cursor: pointer;
      height: 42px;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.2s, transform 0.15s;
    }
    #sendBtn:hover { background: var(--accent-hover); }
    #sendBtn:active { transform: scale(0.96); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ══ USAGE MODAL ══ */
    .usage-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .usage-overlay.open { opacity: 1; pointer-events: all; }
    .usage-modal {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-46%) scale(0.9);
      z-index: 101; background: var(--card);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 1.3rem; padding: 1.5rem 1.3rem;
      width: min(460px, 92vw);
      box-shadow: 0 30px 80px rgba(0,0,0,0.65);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.22,1,.36,1);
      max-height: 85dvh; overflow-y: auto;
    }
    .usage-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%,-50%) scale(1); }
    .usage-modal::-webkit-scrollbar { width: 5px; }
    .usage-modal::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .usage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .usage-title { font-size: 1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .usage-close { background: none; border: none; color: var(--text-sub); font-size: 1.3rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.4rem; transition: color 0.2s, background 0.2s; line-height: 1; }
    .usage-close:hover { color: var(--text); background: rgba(128,128,128,0.12); }

    .usage-section { margin-bottom: 1rem; }
    .usage-section-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-sub); margin-bottom: 0.5rem; }

    .usage-row {
      display: flex; flex-direction: column; gap: 0.25rem;
      background: var(--btn-bg); border: 1px solid var(--btn-border);
      border-radius: 0.6rem; padding: 0.65rem 0.8rem;
      margin-bottom: 0.4rem;
    }
    .usage-row-top { display: flex; justify-content: space-between; align-items: center; }
    .usage-row-name { font-size: 0.8rem; color: var(--text); font-weight: 600; }
    .usage-row-val  { font-size: 0.78rem; color: var(--accent); font-family: 'Courier New', monospace; }

    .usage-bar-track { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 0.2rem; }
    .usage-bar-fill  { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s ease; }
    .usage-bar-fill.warn  { background: #e8a030; }
    .usage-bar-fill.danger{ background: #e85030; }

    .usage-user-row { display: flex; align-items: center; gap: 0.7rem; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 0.6rem; padding: 0.65rem 0.8rem; margin-bottom: 0.9rem; }
    .usage-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: #fff; flex-shrink: 0; }
    .usage-user-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .usage-user-sub  { font-size: 0.7rem; color: var(--text-sub); margin-top: 0.1rem; }

    .usage-loading { text-align: center; padding: 2rem; color: var(--text-sub); font-size: 0.85rem; }
    .usage-raw { background: var(--code-bg); border: 1px solid var(--btn-border); border-radius: 0.5rem; padding: 0.75rem; font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--text-sub); white-space: pre-wrap; word-break: break-all; overflow-x: auto; }
    .usage-refresh { width: 100%; background: var(--btn-bg); color: var(--text); border: 1px solid var(--btn-border); border-radius: 0.6rem; padding: 0.5rem; font-size: 0.78rem; cursor: pointer; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
    .usage-refresh:hover { background: var(--btn-border); }

    body.theme-blueprint .usage-modal { border-radius: 0; border: 2px solid #000; box-shadow: 6px 6px 0 #000; }
    body.theme-blueprint .usage-row { border-radius: 0; border: 2px solid #000; }
    body.theme-blueprint .usage-user-row { border-radius: 0; border: 2px solid #000; }

    /* ══ THEME SYSTEM ══ */
    .theme-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
    .theme-overlay.open { opacity: 1; pointer-events: all; }
    .theme-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-46%) scale(0.88); z-index: 101; background: var(--card); border: 1px solid rgba(255,255,255,0.09); border-radius: 1.3rem; padding: 1.5rem 1.3rem; width: min(420px, 92vw); box-shadow: 0 30px 80px rgba(0,0,0,0.65); opacity: 0; pointer-events: none; transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.22,1,.36,1); }
    .theme-panel.open { opacity: 1; pointer-events: all; transform: translate(-50%,-50%) scale(1); }
    .theme-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .theme-panel-title { font-size: 1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .theme-close { background: none; border: none; color: var(--text-sub); font-size: 1.3rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.4rem; transition: color 0.2s, background 0.2s; line-height: 1; }
    .theme-close:hover { color: var(--text); background: rgba(128,128,128,0.12); }
    .theme-section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-sub); text-align: left; margin: 0.8rem 0 0.4rem; }
    .theme-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.45rem; }
    .theme-card { border-radius: 0.7rem; padding: 0.5rem 0.25rem; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; }
    .theme-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .theme-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(104,176,106,0.22); }
    .theme-swatch { width: 36px; height: 36px; border-radius: 50%; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.28); }
    .theme-swatch-half { position: absolute; top: 0; width: 50%; height: 100%; }
    .theme-swatch-left  { left: 0; }
    .theme-swatch-right { right: 0; }

    [data-theme="forest"]   { background:#1e2922; } [data-theme="forest"]   .theme-swatch-left{background:#1a1f1c;} [data-theme="forest"]   .theme-swatch-right{background:#68b06a;}
    [data-theme="ocean"]    { background:#111a28; } [data-theme="ocean"]    .theme-swatch-left{background:#0d1520;} [data-theme="ocean"]    .theme-swatch-right{background:#3a8eff;}
    [data-theme="violet"]   { background:#1c1428; } [data-theme="violet"]   .theme-swatch-left{background:#130e1f;} [data-theme="violet"]   .theme-swatch-right{background:#a066e8;}
    [data-theme="ember"]    { background:#251410; } [data-theme="ember"]    .theme-swatch-left{background:#1c0e0a;} [data-theme="ember"]    .theme-swatch-right{background:#e8572a;}
    [data-theme="arctic"]   { background:#0d1e22; } [data-theme="arctic"]   .theme-swatch-left{background:#091518;} [data-theme="arctic"]   .theme-swatch-right{background:#00c4b4;}
    [data-theme="obsidian"] { background:#1a1c20; } [data-theme="obsidian"] .theme-swatch-left{background:#141618;} [data-theme="obsidian"] .theme-swatch-right{background:#a0aec0;}
    [data-theme="mint"]     { background:#e8f5ea; } [data-theme="mint"]     .theme-swatch-left{background:#f3faf4;} [data-theme="mint"]     .theme-swatch-right{background:#2e9e58;}
    [data-theme="golden"]   { background:#fdf3e3; } [data-theme="golden"]   .theme-swatch-left{background:#fffaf2;} [data-theme="golden"]   .theme-swatch-right{background:#d97a18;}
    [data-theme="cherry"]   { background:#fce8ef; } [data-theme="cherry"]   .theme-swatch-left{background:#fff0f5;} [data-theme="cherry"]   .theme-swatch-right{background:#e0436a;}
    [data-theme="lavender"] { background:#f0ecfc; } [data-theme="lavender"] .theme-swatch-left{background:#f8f5ff;} [data-theme="lavender"] .theme-swatch-right{background:#7c4ddb;}
    [data-theme="peach"]    { background:#fef0e8; } [data-theme="peach"]    .theme-swatch-left{background:#fff7f2;} [data-theme="peach"]    .theme-swatch-right{background:#e8733a;}
    [data-theme="sky"]      { background:#e8f4fc; } [data-theme="sky"]      .theme-swatch-left{background:#f0f8ff;} [data-theme="sky"]      .theme-swatch-right{background:#1a90d4;}
    [data-theme="blueprint"] { background:#e8e8e8; } [data-theme="blueprint"] .theme-swatch-left{background:#ffffff;} [data-theme="blueprint"] .theme-swatch-right{background:#000000;}

    body.theme-forest   { --bg:#1a1f1c; --card:#222827; --text:#dfeee0; --text-sub:#6b7c6e; --accent:#68b06a; --accent-hover:#4f9a52; --btn-bg:#2a2f2d; --btn-border:#555; --input-bg:#2a2f2d; --input-border:#555; --msg-user:#2a3d2c; --msg-ai:#1e2922; --code-bg:#141814; }
    body.theme-ocean    { --bg:#0d1520; --card:#111e30; --text:#c8ddfa; --text-sub:#4a6080; --accent:#3a8eff; --accent-hover:#1a70f0; --btn-bg:#162035; --btn-border:#2a4060; --input-bg:#162035; --input-border:#2a4060; --msg-user:#0e2040; --msg-ai:#111e30; --code-bg:#0a1020; }
    body.theme-violet   { --bg:#130e1f; --card:#1c1428; --text:#e0d4f8; --text-sub:#6a5080; --accent:#a066e8; --accent-hover:#8244d4; --btn-bg:#261b3a; --btn-border:#4a3060; --input-bg:#261b3a; --input-border:#4a3060; --msg-user:#261434; --msg-ai:#1c1428; --code-bg:#100a1a; }
    body.theme-ember    { --bg:#1c0e0a; --card:#251410; --text:#f8d4c0; --text-sub:#8a5040; --accent:#e8572a; --accent-hover:#c83c14; --btn-bg:#351810; --btn-border:#6a3020; --input-bg:#351810; --input-border:#6a3020; --msg-user:#3a1408; --msg-ai:#251410; --code-bg:#150808; }
    body.theme-arctic   { --bg:#091518; --card:#0d1e22; --text:#b8eee8; --text-sub:#3a7068; --accent:#00c4b4; --accent-hover:#00a898; --btn-bg:#102428; --btn-border:#1e4848; --input-bg:#102428; --input-border:#1e4848; --msg-user:#0a2428; --msg-ai:#0d1e22; --code-bg:#061010; }

<script>
/* ══════════════ THEME ══════════════ */
const ALL_THEMES = ['forest','ocean','violet','ember','arctic','obsidian','mint','golden','cherry','lavender','peach','sky','blueprint'];
const LIGHT_THEMES = ['mint','golden','cherry','lavender','peach','sky','blueprint'];
let currentTheme = 'forest';

function openThemePanel()  { document.getElementById('themeOverlay').classList.add('open');    document.getElementById('themePanel').classList.add('open'); }
function closeThemePanel() { document.getElementById('themeOverlay').classList.remove('open'); document.getElementById('themePanel').classList.remove('open'); }

function applyTheme(name, card) {
  ALL_THEMES.forEach(t => document.body.classList.remove('theme-' + t));
  document.body.classList.add('theme-' + name);
  currentTheme = name;
  const hlLink = document.getElementById('hlThemeLink');
  if (LIGHT_THEMES.includes(name)) {
    hlLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  } else {
    hlLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
  }
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
  if (card) card.classList.add('active');
  try { localStorage.setItem('ai_chat_theme', name); } catch(e) {}
  setTimeout(closeThemePanel, 240);
}

document.addEventListener('DOMContentLoaded', () => {
  let saved = 'forest';
  try { saved = localStorage.getItem('ai_chat_theme') || 'forest'; } catch(e) {}
  const card = document.querySelector(`.theme-card[data-theme="${saved}"]`);
  applyTheme(saved, card);
  loadAccountInfo();
});

/* ══════════════ ACCOUNT SWITCHER ══════════════ */
let accountDropdownOpen = false;

function toggleAccountDropdown() {
  accountDropdownOpen = !accountDropdownOpen;
  document.getElementById('accountDropdown').classList.toggle('open', accountDropdownOpen);
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (accountDropdownOpen && !document.getElementById('accountWrap').contains(e.target)) {
    accountDropdownOpen = false;
    document.getElementById('accountDropdown').classList.remove('open');
  }
});

async function loadAccountInfo() {
  try {
    const user = await puter.auth.getUser();
    const name = user.username || user.email || 'Puter User';
    const initial = name[0].toUpperCase();
    document.getElementById('accountAvatar').textContent = initial;
    document.getElementById('accountName').textContent = name;
    document.getElementById('ddName').textContent = name;
    document.getElementById('ddEmail').textContent = user.email || (user.is_temp_user ? 'Guest account' : '');
  } catch (e) {
    document.getElementById('accountAvatar').textContent = '?';
    document.getElementById('accountName').textContent = 'Not signed in';
    document.getElementById('ddName').textContent = 'Not signed in';
    document.getElementById('ddEmail').textContent = '';
  }
}

async function signOutOfPuter() {
  closeAccountDropdown();
  try {
    await puter.auth.signOut();
    // Reset UI
    document.getElementById('accountAvatar').textContent = '?';
    document.getElementById('accountName').textContent = 'Not signed in';
    document.getElementById('ddName').textContent = 'Not signed in';
    document.getElementById('ddEmail').textContent = '';
  } catch (e) {
    alert('Sign out failed: ' + (e?.message || e));
  }
}

async function signInToPuter() {
  closeAccountDropdown();
  try {
    await puter.auth.signIn();
    await loadAccountInfo();
  } catch (e) {
    // User closed the dialog — that's fine
  }
}

async function switchAccount() {
  closeAccountDropdown();
  try {
    // Sign out first, then immediately sign in
    await puter.auth.signOut();
    await puter.auth.signIn();
    await loadAccountInfo();
  } catch (e) {
    // If sign-in was cancelled just reload account info
    await loadAccountInfo();
  }
}

function closeAccountDropdown() {
  accountDropdownOpen = false;
  document.getElementById('accountDropdown').classList.remove('open');
}

/* ══════════════ MARKDOWN / CODE RENDERER ══════════════ */
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  const codeBlocks = [];
  let processed = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang || '', code: code.trimEnd() });
    return `%%CODEBLOCK_${idx}%%`;
  });

  processed = processed.replace(/`([^`]+)`/g, '<code>$1</code>');
  processed = processed.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  processed = processed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  processed = processed.replace(/\*(.+?)\*/g, '<em>$1</em>');
  processed = processed.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  processed = processed.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  processed = processed.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  processed = processed.replace(/^---+$/gm, '<hr>');

  processed = processed.replace(/((?:^[ \t]*[-*] .+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  processed = processed.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  const paras = processed.split(/\n{2,}/);
  processed = paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-6]|ul|ol|hr|pre|blockquote)/.test(p)) return p;
    if (p.includes('%%CODEBLOCK_')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  codeBlocks.forEach(({ lang, code }, i) => {
    const escapedCode = escapeHtml(code);
    let highlighted;
    try {
      if (lang && hljs.getLanguage(lang)) {
        highlighted = hljs.highlight(code, { language: lang }).value;
      } else {
        highlighted = hljs.highlightAuto(code).value;
        if (!lang) lang = '';
      }
    } catch(e) { highlighted = escapedCode; }
    const header = `<div class="code-header"><span class="code-lang">${escapeHtml(lang) || 'code'}</span><button class="copy-code-btn" onclick="copyCode(this)">Copy</button></div>`;
    processed = processed.replace(
      `%%CODEBLOCK_${i}%%`,
      `<pre>${header}<code class="language-${escapeHtml(lang)}">${highlighted}</code></pre>`
    );
  });
  return processed;
}

function copyCode(btn) {
  const pre = btn.closest('pre');
  const code = pre.querySelector('code');
  navigator.clipboard.writeText(code.innerText);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

/* ══════════════ USAGE MODAL ══════════════ */
function openUsageModal() {
  document.getElementById('usageOverlay').classList.add('open');
  document.getElementById('usageModal').classList.add('open');
  loadUsage();
}
function closeUsageModal() {
  document.getElementById('usageOverlay').classList.remove('open');
  document.getElementById('usageModal').classList.remove('open');
}

async function loadUsage() {
  const container = document.getElementById('usageContent');
  container.innerHTML = '<div class="usage-loading">Loading...</div>';
  try {
    const [user, monthly, detailed] = await Promise.allSettled([
      puter.auth.getUser(),
      puter.auth.getMonthlyUsage(),
      puter.auth.getDetailedAppUsage()
    ]);
    let html = '';
    if (user.status === 'fulfilled' && user.value) {
      const u = user.value;
      const initial = (u.username || u.email || '?')[0].toUpperCase();
      html += `<div class="usage-user-row">
        <div class="usage-avatar">${initial}</div>
        <div>
          <div class="usage-user-name">${escapeHtml(u.username || u.email || 'Unknown')}</div>
          <div class="usage-user-sub">${escapeHtml(u.email || '')}${u.is_temp_user ? ' · Guest account' : ''}</div>
        </div>
      </div>`;
    }
    if (monthly.status === 'fulfilled' && monthly.value) {
      html += renderUsageData('Monthly Usage', monthly.value);
    } else if (monthly.status === 'rejected') {
      html += `<div class="usage-section"><div class="usage-section-label">Monthly Usage</div><div class="usage-row"><div class="usage-row-top"><span class="usage-row-name" style="color:var(--text-sub)">Not available (sign in required)</span></div></div></div>`;
    }
    if (detailed.status === 'fulfilled' && detailed.value) {
      html += renderUsageData('Detailed App Usage', detailed.value);
    }
    container.innerHTML = html || '<div class="usage-loading" style="color:var(--text-sub)">No usage data returned by Puter.</div>';
  } catch (err) {
    container.innerHTML = `<div class="usage-loading" style="color:#e05555">Error: ${escapeHtml(String(err?.message || err))}</div>`;
  }
}

function renderUsageData(title, data) {
  let html = `<div class="usage-section"><div class="usage-section-label">${title}</div>`;
  if (Array.isArray(data)) {
    if (data.length === 0) {
      html += `<div class="usage-row"><div class="usage-row-top"><span class="usage-row-name" style="color:var(--text-sub)">No data</span></div></div>`;
    } else {
      data.forEach(item => { html += renderUsageItem(item); });
    }
  } else if (typeof data === 'object' && data !== null) {
    const keys = Object.keys(data);
    const allSimple = keys.every(k => typeof data[k] !== 'object' || data[k] === null);
    if (allSimple) {
      const usedKey  = keys.find(k => /used|count|consumed/i.test(k));
      const limitKey = keys.find(k => /limit|max|total|quota/i.test(k));
      if (usedKey && limitKey) {
        const used = Number(data[usedKey]) || 0;
        const limit = Number(data[limitKey]) || 0;
        const pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;
        const cls = pct > 90 ? 'danger' : pct > 70 ? 'warn' : '';
        html += `<div class="usage-row">
          <div class="usage-row-top"><span class="usage-row-name">${title}</span><span class="usage-row-val">${fmtNum(used)} / ${fmtNum(limit)}</span></div>
          <div class="usage-bar-track"><div class="usage-bar-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
        </div>`;
        keys.filter(k => k !== usedKey && k !== limitKey).forEach(k => { html += simpleRow(k, data[k]); });
      } else {
        keys.forEach(k => { html += simpleRow(k, data[k]); });
      }
    } else {
      keys.forEach(k => {
        const v = data[k];
        if (typeof v === 'object' && v !== null) { html += renderUsageItem(v, k); }
        else { html += simpleRow(k, v); }
      });
    }
  } else {
    html += `<div class="usage-row"><div class="usage-row-top"><span class="usage-row-name">${title}</span><span class="usage-row-val">${escapeHtml(String(data))}</span></div></div>`;
  }
  html += `<details style="margin-top:0.4rem">
    <summary style="font-size:0.65rem;color:var(--text-sub);cursor:pointer;user-select:none;padding:0.2rem 0">Show raw JSON</summary>
    <div class="usage-raw">${escapeHtml(JSON.stringify(data, null, 2))}</div>
  </details>`;
  html += '</div>';
  return html;
}

function renderUsageItem(item, label) {
  if (typeof item !== 'object' || item === null) return simpleRow(label || 'value', item);
  const keys = Object.keys(item);
  const usedKey  = keys.find(k => /^(used|count|consumed|value|current)$/i.test(k));
  const limitKey = keys.find(k => /^(limit|max|quota|total|allowed)$/i.test(k));
  const nameKey  = keys.find(k => /^(name|label|type|service|model|resource)$/i.test(k));
  const name     = label || (nameKey ? item[nameKey] : null) || keys[0];
  if (usedKey !== undefined && limitKey !== undefined) {
    const used  = Number(item[usedKey])  || 0;
    const limit = Number(item[limitKey]) || 0;
    const pct   = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;
    const cls   = pct > 90 ? 'danger' : pct > 70 ? 'warn' : '';
    const remaining = limit - used;
    return `<div class="usage-row">
      <div class="usage-row-top"><span class="usage-row-name">${escapeHtml(String(name))}</span><span class="usage-row-val">${fmtNum(used)} / ${fmtNum(limit)}</span></div>
      <div class="usage-bar-track"><div class="usage-bar-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
      <div style="font-size:0.68rem;color:var(--text-sub);margin-top:0.15rem">${fmtNum(remaining)} remaining · ${pct.toFixed(1)}% used</div>
    </div>`;
  }
  let html = `<div class="usage-row"><div class="usage-row-top"><span class="usage-row-name">${escapeHtml(String(name))}</span></div>`;
  keys.filter(k => k !== nameKey).forEach(k => {
    const v = item[k];
    html += `<div style="display:flex;justify-content:space-between;font-size:0.72rem;padding:0.1rem 0;color:var(--text-sub)">
      <span>${escapeHtml(String(k))}</span>
      <span style="color:var(--text);font-family:'Courier New',monospace">${escapeHtml(String(v))}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

function simpleRow(key, val) {
  return `<div class="usage-row">
    <div class="usage-row-top"><span class="usage-row-name">${escapeHtml(String(key))}</span><span class="usage-row-val">${escapeHtml(String(val))}</span></div>
  </div>`;
}

function fmtNum(n) {
  const num = Number(n);
  if (isNaN(num)) return String(n);
  if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
  if (num >= 1_000)     return (num / 1_000).toFixed(1) + 'K';
  return num.toLocaleString();
}

/* ══════════════ CHAT ══════════════ */
let chatHistory = [];
let isStreaming = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function scrollBottom() {
  const cw = document.getElementById('chatWindow');
  cw.scrollTop = cw.scrollHeight;
}

function addMessage(role, content) {
  const cw = document.getElementById('chatWindow');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const label = document.createElement('div');
  label.className = 'msg-label' + (role === 'user' ? ' right' : '');
  label.textContent = role === 'user' ? 'You' : document.getElementById('modelSelect').selectedOptions[0].text;
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  if (role === 'ai') {
    msg.innerHTML = content ? renderMarkdown(content) : '';
  } else {
    msg.textContent = content;
  }
  cw.appendChild(label);
  cw.appendChild(msg);
  scrollBottom();
  return msg;
}

function showTyping() {
  const cw = document.getElementById('chatWindow');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  cw.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  const model = document.getElementById('modelSelect').value;
  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  showTyping();
  try {
    const resp = await puter.ai.chat(chatHistory, { model, stream: true });
    removeTyping();
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = document.getElementById('modelSelect').selectedOptions[0].text;
    document.getElementById('chatWindow').appendChild(label);
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    document.getElementById('chatWindow').appendChild(msg);
    let fullText = '';
    for await (const part of resp) {
      fullText += part?.text ?? '';
      msg.innerHTML = renderMarkdown(fullText);
      scrollBottom();
    }
    chatHistory.push({ role: 'assistant', content: fullText });
  } catch (err) {
    removeTyping();
    const errMsg = addMessage('ai', '');
    errMsg.innerHTML = `<span style="color:#e05555">⚠ Error: ${escapeHtml(err?.message || String(err))}</span>`;
  }
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function clearChat() {
  if (!chatHistory.length) return;
  chatHistory = [];
  const cw = document.getElementById('chatWindow');
  cw.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty-state';
  empty.id = 'emptyState';
  empty.innerHTML = '<div class="empty-icon">✦</div><div class="empty-title">What do you want to know?</div><div class="empty-sub">Select a model above and start chatting</div>';
  cw.appendChild(empty);
}
</script>
